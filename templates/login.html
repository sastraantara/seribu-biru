<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container text-center" style="max-width: 400px;">
    <div class="card shadow border-0 p-4">
        <h3 class="mb-4 text-capitalize">Portal {{ role }}</h3>
        
        {% if error %}
        <div class="alert alert-danger fw-bold shadow-sm p-2 mb-4">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        <form action="/login/{{ role }}" method="POST">
            <input type="text" name="id_petugas" class="form-control form-control-lg mb-3 text-center" placeholder="Masukkan ID Petugas (Contoh: K01)" required>
            <button type="submit" class="btn btn-primary btn-lg w-100">Masuk</button>
        </form>
        
        <a href="/" class="text-muted mt-4 d-block text-decoration-none">⬅ Kembali ke Menu Utama</a>
    </div>
</div>
</body>
</html>
